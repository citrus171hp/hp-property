<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="680" height="320" fill="#ffffff"/>
  <text x="40" y="34" font-size="19" font-weight="700" fill="#1f2933">关键事件时间线（7/1–7/8）</text>

  <line x1="80" y1="170" x2="640" y2="170" stroke="#cbd5e1" stroke-width="3"/>

  <!-- 7/1 -->
  <circle cx="80" cy="170" r="8" fill="#14b8a6"/>
  <text x="80" y="148" font-size="12" font-weight="600" fill="#0f766e" text-anchor="middle">Claude Sonnet 5</text>
  <text x="80" y="196" font-size="11" fill="#64748b" text-anchor="middle">7/1</text>

  <!-- 7/2 -->
  <circle cx="160" cy="170" r="8" fill="#3b82f6"/>
  <text x="160" y="196" font-size="12" font-weight="600" fill="#1d4ed8" text-anchor="middle">宇树 IPO 证监会批复</text>
  <text x="160" y="150" font-size="11" fill="#64748b" text-anchor="middle">7/2</text>

  <!-- 7/6 (group) -->
  <circle cx="480" cy="170" r="8" fill="#f59e0b"/>
  <text x="480" y="148" font-size="12" font-weight="600" fill="#b45309" text-anchor="middle">腾讯 Hy3 正式版</text>
  <text x="480" y="164" font-size="11" fill="#b45309" text-anchor="middle">美团 LongCat-2.0 开源</text>
  <text x="480" y="196" font-size="11" fill="#64748b" text-anchor="middle">7/6 · 宇树注册生效</text>

  <!-- 7/7 -->
  <circle cx="560" cy="170" r="8" fill="#8b5cf6"/>
  <text x="560" y="196" font-size="12" font-weight="600" fill="#6d28d9" text-anchor="middle">WAIC 发布会</text>
  <text x="560" y="150" font-size="11" fill="#64748b" text-anchor="middle">7/7</text>

  <!-- 7/8 -->
  <circle cx="640" cy="170" r="8" fill="#ef4444"/>
  <text x="640" y="148" font-size="12" font-weight="600" fill="#b91c1c" text-anchor="middle">SambaNova $1B</text>
  <text x="640" y="196" font-size="11" fill="#64748b" text-anchor="middle">7/8</text>

  <text x="40" y="300" font-size="11" fill="#94a3b8">注：Sonnet 5（7/1）与 Etched 融资（6/30）属窗口前夕，因议题强相关一并收录。</text>
</svg>
