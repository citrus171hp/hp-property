<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <!-- 标题 -->
  <text x="70" y="32" font-size="16" font-weight="700" fill="#444">光模块出货量预测（万只）</text>

  <!-- 图例 -->
  <rect x="430" y="20" width="14" height="14" rx="3" fill="#9a6a4d"/>
  <text x="448" y="32" font-size="13" fill="#555">2026E</text>
  <rect x="510" y="20" width="14" height="14" rx="3" fill="#6b8cae"/>
  <text x="528" y="32" font-size="13" fill="#555">2027E</text>

  <!-- 网格线 -->
  <g stroke="#e3ddd2" stroke-width="1">
    <line x1="70" y1="310" x2="610" y2="310"/>
    <line x1="70" y1="226.67" x2="610" y2="226.67"/>
    <line x1="70" y1="143.33" x2="610" y2="143.33"/>
    <line x1="70" y1="60" x2="610" y2="60"/>
  </g>

  <!-- Y 轴刻度 -->
  <g font-size="12" fill="#888" text-anchor="end">
    <text x="62" y="314">0</text>
    <text x="62" y="230.67">2000</text>
    <text x="62" y="147.33">4000</text>
    <text x="62" y="64">6000</text>
  </g>

  <!-- 800G 组 -->
  <rect x="140" y="122.5" width="55" height="187.5" rx="4" fill="#9a6a4d"/>
  <rect x="200" y="60" width="55" height="250" rx="4" fill="#6b8cae"/>
  <text x="167.5" y="114.5" font-size="12" font-weight="600" fill="#444" text-anchor="middle">4500</text>
  <text x="227.5" y="52" font-size="12" font-weight="600" fill="#444" text-anchor="middle">6000</text>

  <!-- 1.6T 组 -->
  <rect x="400" y="241.25" width="55" height="68.75" rx="4" fill="#9a6a4d"/>
  <rect x="460" y="112.08" width="55" height="197.92" rx="4" fill="#6b8cae"/>
  <text x="427.5" y="233.25" font-size="12" font-weight="600" fill="#444" text-anchor="middle">1650</text>
  <text x="487.5" y="104.08" font-size="12" font-weight="600" fill="#444" text-anchor="middle">4750</text>

  <!-- 类别标签 -->
  <g font-size="13" font-weight="600" fill="#555" text-anchor="middle">
    <text x="197.5" y="332">800G</text>
    <text x="457.5" y="332">1.6T</text>
  </g>
</svg>
